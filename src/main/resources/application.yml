server:
  port: 8080

spring:
  application:
    name: candle-aggregation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/candlesdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.multibank.candles: INFO
