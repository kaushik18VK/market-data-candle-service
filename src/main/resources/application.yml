server:
  port: 8080

spring:
  application:
    name: candle-aggregation-service
  datasource:
    url: jdbc:h2:mem:candlesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.multibank.candles: INFO
