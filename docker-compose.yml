services:
  postgres:
    image: postgres:16
    container_name: candles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: candlesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d candlesdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: candle-aggregation-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/candlesdb
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8080"
    restart: unless-stopped

volumes:
  pgdata:
